<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>發現三角形的面積公式</title>
<style>
    @font-face {
        font-family: 'jf-open-huninn';
        src: url('https://cdn.jsdelivr.net/gh/marsnow/open-huninn-font@1.1/font/jf-openhuninn.woff') format('woff'),
             url('https://cdn.jsdelivr.net/gh/marsnow/open-huninn-font@1.1/font/jf-openhuninn.ttf') format('truetype');
        font-weight: normal; font-style: normal; font-display: swap;
    }
    *, *::before, *::after { box-sizing: border-box; }
    html, body { margin:0; height:100%; }
    body {
        background-color:#d8ebef;
        font-family:'jf-open-huninn',sans-serif;
        color:#4aabc4; letter-spacing:.05em;
        overflow:hidden;
    }

    /* ── 選單畫面 ── */
    #menu-view {
        min-height:100%; display:flex; align-items:center; justify-content:center;
    }
    .wrap { width:100%; max-width:900px; padding:24px; text-align:center; }
    h1 {
        font-size:clamp(24px,3.2vw,34px); font-weight:bold; margin-bottom:6px;
        text-shadow:1px 1px 2px rgba(0,0,0,.05);
    }
    .subtitle { color:#7ab3c2; font-size:clamp(14px,1.4vw,17px); margin-bottom:36px; }
    .sub-heading { color:#4aabc4; font-size:clamp(15px,1.5vw,18px); font-weight:bold; margin-bottom:14px; }
    .cards { display:flex; gap:24px; justify-content:center; flex-wrap:wrap; }
    .card {
        flex:1 1 320px; max-width:360px;
        background:#fff; border-radius:20px; padding:28px 24px;
        box-shadow:0 6px 24px rgba(74,171,196,.18);
        text-decoration:none; color:inherit;
        display:flex; flex-direction:column; align-items:center;
        transition:transform .2s ease, box-shadow .2s ease;
        border:2px solid transparent; cursor:pointer;
        font-family:inherit;
    }
    .card:hover { transform:translateY(-4px); box-shadow:0 10px 30px rgba(74,171,196,.28); border-color:#4aabc4; }
    .card-icon {
        width:60px; height:60px;
        display:flex; align-items:center; justify-content:center;
        margin-bottom:16px; position:relative; overflow:visible;
    }
    .card-icon img { width:104px; height:104px; object-fit:contain; position:relative; z-index:1; }
    .icon-guided, .icon-free { background:none; }
    .card-title { font-size:clamp(18px,1.8vw,21px); font-weight:bold; color:#2d6a7a; margin-bottom:6px; }
    .card-desc { font-size:clamp(13px,1.2vw,14.5px); color:#6b7f86; line-height:1.7; margin-bottom:18px; }
    .card-tag {
        font-size:12.5px; font-weight:bold; letter-spacing:.08em;
        padding:5px 14px; border-radius:20px;
    }
    .tag-guided { background:#4aabc4; color:#fff; }
    .tag-free   { background:#e64a38; color:#fff; }

    /* ── 教具畫面 ── */
    #app-view {
        display:none; position:relative; width:100%; height:100%;
    }
    #app-frame {
        width:100%; height:100%; border:none; display:block;
    }
    #float-back {
        position:absolute; top:14px; left:16px; z-index:10;
        background:none; border:none; color:#4aabc4;
        padding:4px 6px; font-family:inherit; font-size:14px; font-weight:bold;
        cursor:pointer; text-shadow:0 1px 3px rgba(255,255,255,.8);
        transition:color .2s;
    }
    #float-back:hover { color:#e5b800; }
</style>
</head>

function b64DecodeUnicode(str) {
    return decodeURIComponent(
        atob(str).split('').map(function(c) {
            return '%' + ('00' + c.charCodeAt(0).toString(16)).slice(-2);
        }).join('')
    );
}

function openApp(which){
    const html = which === 'guided' ? b64DecodeUnicode(TRIANGLE_B64) : b64DecodeUnicode(FREEPLAY_B64);
    document.getElementById('app-frame').srcdoc = html;
    document.getElementById('menu-view').style.display = 'none';
    document.getElementById('app-view').style.display = 'block';
}

function showMenu(){
    document.getElementById('app-view').style.display = 'none';
    document.getElementById('menu-view').style.display = 'flex';
    document.getElementById('app-frame').srcdoc = '';
}

window.addEventListener('message', function(e){
    if(e.data === 'backToMenu') showMenu();
});
</script>
