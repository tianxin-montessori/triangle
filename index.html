<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>三角形藏著什麼秘密？</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Huninn&display=swap');
        @font-face {
            font-family: 'jf-openhuninn';
            src: url('https://cdn.jsdelivr.net/gh/justfont/open-huninn-font@v2.1/font/jf-openhuninn-2.1.woff2') format('woff2');
            font-display: swap;
        }
        *, *::before, *::after { box-sizing: border-box; }

        body {
            touch-action:none; -webkit-touch-callout:none;
            overflow:hidden; background-color:#d8ebef; margin:0;
            font-family:'jf-openhuninn','Huninn',sans-serif;
            color:#4aabc4; letter-spacing:.05em;
        }
        svg { user-select:none; -webkit-user-select:none; }

        .draggable { cursor:grab; transition:filter .2s; filter:drop-shadow(0 0 2px rgba(0,0,0,.4)); }
        .draggable:active,.draggable.dragging { cursor:grabbing; filter:drop-shadow(3px 10px 15px rgba(0,0,0,.5))!important; }
        .animating { transition:transform .2s ease-out,filter .2s; }

        @keyframes popIn    { 0%{transform:scale(.5);opacity:0} 100%{transform:scale(1);opacity:1} }
        @keyframes fadeUp   { from{opacity:0;transform:translateY(8px)} to{opacity:1;transform:translateY(0)} }
        @keyframes badgePop { 0%{transform:scale(.6);opacity:0} 70%{transform:scale(1.1)} 100%{transform:scale(1);opacity:1} }
        @keyframes equivIn  { 0%{opacity:0;transform:scale(.92)} 100%{opacity:1;transform:scale(1)} }
        @keyframes arcIn    { from{opacity:0} to{opacity:1} }
        @keyframes labelGlow { 0%,100%{fill:#4a3000} 40%{fill:#fe8081} }
        .label-glow { animation:labelGlow 1.1s ease-in-out 2; }
        @keyframes glowPulse{ 0%,100%{opacity:.45} 50%{opacity:1} }
        @keyframes shake    { 0%,100%{transform:translateX(0)} 20%{transform:translateX(-5px)} 50%{transform:translateX(5px)} 75%{transform:translateX(-3px)} 90%{transform:translateX(3px)} }
        @keyframes lineGlow { 0%,100%{opacity:.6;filter:none} 50%{opacity:1;filter:drop-shadow(0 0 9px #ffd25d)} }
        @keyframes celebIn  { 0%{opacity:0;transform:scale(.85) translateY(20px)} 100%{opacity:1;transform:scale(1) translateY(0)} }
        .glow-blink { animation: lineGlow 1.4s ease-in-out infinite; }
        .fcard-anim { opacity:0; transition:opacity .5s ease; }
        .fcard-anim.visible { opacity:1; }
        @keyframes emphAnnot { 0%{transform:scale(1);color:#4b5563} 45%{transform:scale(1.22);color:#4aabc4} 100%{transform:scale(1.08);color:#4aabc4} }
        .annot-emph { animation:emphAnnot .75s ease forwards; }

        /* ── 雙排進度條小步驟標籤 ── */
        .ss-lbl {
            font-family:'jf-openhuninn','Huninn',sans-serif;
            font-size: clamp(12px, 1.2vw, 14px);
            color:rgba(100,130,150,.42); transition:color .35s, font-weight .2s;
            white-space:nowrap;
        }
        .ss-lbl.done    { color:#2d8fa8; }
        .ss-lbl.current {
            color:#4aabc4; font-weight:bold;
            background:rgba(74,171,196,.12);
            border-radius:10px; padding:2px 7px;
        }
        .ss-sep { color:rgba(100,130,150,.28); font-size:10px; padding:0 1px; }
        .ss-group { transition:opacity .3s; }
        .ss-group.ss-hidden { opacity:0; pointer-events:none; }

        g.draggable:not(.dragging):not(.animating):hover {
            filter: drop-shadow(0 6px 16px rgba(0,0,0,.52));
            transition: filter .18s ease;
        }

        .pop-in  { animation:popIn .3s cubic-bezier(.175,.885,.32,1.275) forwards; transform-origin:0 0; }
        .fade-up { animation:fadeUp .35s ease forwards; }

        /* ── 進度條膠囊 ── */
        .phase-pill {
            display:inline-flex; align-items:center; gap:4px;
            padding: clamp(3px,0.5vh,5px) clamp(7px,1vw,11px);
            border-radius:20px;
            font-size: clamp(13px, 1.3vw, 15px);
            letter-spacing:.03em;
            background:#dff0f4; color:#9abfc9;
            transition:all .35s; white-space:nowrap; flex-shrink:0;
        }
        .phase-pill.done   { background:rgba(74,171,196,.15); color:#4aabc4; cursor:pointer; }
        .phase-pill:not(.active):hover {
            background:rgba(74,171,196,.35);
            transform:scale(1.06);
            box-shadow:0 2px 10px rgba(74,171,196,.3);
            cursor:pointer;
            color:white;
        }
        .phase-pill:not(.active)::after { content:''; margin-left:0; opacity:0; transition:opacity .2s,margin .2s; font-size:.85em; }
        .phase-pill:not(.active):hover::after { content:' ↩'; margin-left:2px; opacity:1; }
        .phase-pill.active { background:#4aabc4; color:white; }
        .pill-n { font-size:13px; font-weight:bold; }
        .pill-inline {
            display:inline-flex; align-items:center; justify-content:center;
            width:1.5em; height:1.5em; border-radius:50%;
            background:rgba(255,255,255,.35); color:inherit;
            font-size:.85em; font-weight:bold; flex-shrink:0;
            vertical-align:middle; margin:0 2px;
        }
        .phase-conn { flex:1; height:2px; min-width:14px; background:#c8dfe4; transition:background .4s; }
        .phase-conn.done { background:#4aabc4; }

        /* ── 引導文字 ── */
        /* ▲ 調整：主問句放大到 17px，行距 1.55 */
        .q-blue { color:#4aabc4; font-size:clamp(16px,1.6vw,19px); font-weight:bold; line-height:1.55; margin-bottom:6px; }
        /* ▲ 調整：說明文字行距從 1.4 → 1.6 */
        .q-gray { color:#4b5563; font-size:clamp(15px,1.4vw,17px); line-height:1.6; margin-bottom:5px; }
        /* ▲ 新增：標題性問句——框出主題，不需學習者真的回答 */
        .q-title { color:#9ca3af; font-size:clamp(14px,1.3vw,15px); font-weight:normal; line-height:1.5; margin-bottom:4px; }

        /* ── 發光輪廓 ── */
        .id-target { animation:glowPulse 2s ease-in-out infinite; }
        .id-dim    { animation:none!important; opacity:.18; }

        /* ── 引導面板 ── */
        /* ▲ 調整：背景從純白改為極淡藍綠白 #f5fafb */
        #guidance-panel {
            background:#f5fafb; border-radius:16px; padding:12px 18px;
            box-shadow:0 2px 14px rgba(74,171,196,.13); width:100%; overflow-y:auto;
        }

        /* ── 選項按鈕 ── */
        /* ▲ 調整：
           - 邊框從 #b5d5dc 加深到 #7ab8c5
           - hover 從實心藍 → 淡藍底（區分懸停 vs 已選）
           - 文字從 14px → 15px
        */
        .choice-btn {
            border:2px solid #7ab8c5; color:#4aabc4; background:#fff;
            padding:9px; border-radius:12px; font-family:inherit;
            font-size:clamp(15px,1.4vw,17px); cursor:pointer; transition:all .2s; text-align:center; width:100%;
        }
        /* hover：只是淡底色，不填滿 */
        .choice-btn:hover:not(:disabled) { background:#eaf5f8; color:#2d8fa8; border-color:#4aabc4; }
        /* 選中（由 JS 加上 selected class）：才填滿 */
        .choice-btn.selected { background:#4aabc4; color:#fff; border-color:#4aabc4; }
        .choice-btn:disabled { opacity:.5; cursor:not-allowed; }
        .choice-btn.wrong { background:#ffe0e0!important; border-color:#fe8081!important; color:#fe8081!important; animation:shake .4s ease; }

        /* ── 探索 / 公式按鈕 ── */
        .disc-btn {
            border:2px solid #4aabc4; color:#4aabc4; background:#fff;
            padding:6px 15px; border-radius:20px; font-family:inherit;
            font-size:clamp(14px,1.3vw,16px); cursor:pointer; transition:all .2s; letter-spacing:.05em;
        }
        .disc-btn:hover { background:#eaf5f8; }
        .disc-btn.revealed { background:#ffd25d; border-color:#e5b800; color:#7a5800; pointer-events:none; }
        .disc-btn.selected { background:#4aabc4; border-color:#4aabc4; color:#fff; pointer-events:none; }

        .fstep {
            background:#f0f9fb; border-left:4px solid #b5d5dc;
            border-radius:0 8px 8px 0; padding:7px 14px; margin:4px 0;
            opacity:0; transform:translateY(6px);
            transition:opacity .4s ease,transform .4s ease,border-color .3s; font-size:14px;
        }
        .fstep.visible { opacity:1; transform:translateY(0); border-left-color:#4aabc4; }
        .fstep.red { background:#fff5f5; }
        .fstep.visible.red { border-left-color:#fe8081; }

        /* ── 等值方框 ── */
        #equiv-box {
            background:linear-gradient(135deg,rgba(74,171,196,.08),rgba(255,210,93,.16));
            border:2px solid rgba(255,210,93,.75); border-radius:16px;
            padding:12px 20px; text-align:center;
            animation:equivIn .55s cubic-bezier(.175,.885,.32,1.275) forwards;
        }

        /* ── 主按鈕 ── */
        .btn-next {
            background:#4aabc4; color:#fff; border:none;
            padding:9px 26px; border-radius:12px; font-size:clamp(13px,1.2vw,15px); font-weight:bold;
            font-family:inherit; cursor:pointer; letter-spacing:.08em;
            box-shadow:0 3px 12px rgba(74,171,196,.35); transition:all .2s;
        }
        .btn-next:hover  { background:#3a9ab3; transform:translateY(-1px); }
        .btn-next:active { transform:scale(.97); }
        .btn-back {
            background:transparent; color:#9ca3af;
            border:2px solid #d1d5db; padding:8px 16px; border-radius:10px;
            font-family:inherit; font-size:clamp(13px,1.2vw,15px); cursor:pointer; transition:all .2s;
        }
        .btn-back:hover { border-color:#4aabc4; color:#4aabc4; }

        /* ── 徽章 ── */
        /* ▲ 調整：文字顏色從 #7a5800 → #5a3e00（對比度提升）；字體 13px → 14px */
        .badge {
            display:inline-flex; align-items:center; gap:4px;
            background:#ffd25d; color:#5a3e00; border-radius:20px;
            padding:5px 14px; font-size:clamp(13px,1.2vw,15px);
            animation:badgePop .45s cubic-bezier(.175,.885,.32,1.275) forwards;
        }
        .badge-teal {
            display:inline-flex; align-items:center; gap:4px;
            background:rgba(74,171,196,.12); color:#3a8fa8;
            border:1.5px solid rgba(74,171,196,.3); border-radius:20px;
            padding:5px 14px; font-size:clamp(13px,1.2vw,15px);
            animation:badgePop .45s cubic-bezier(.175,.885,.32,1.275) forwards;
        }

        /* ── 操作提示面板 ── */
        #hint-panel {
            display:none;
            flex-direction:column;
            width: 172px;
            flex-shrink:0; height:100%; overflow-y:visible;
            padding:10px 14px; box-sizing:border-box;
            background:#f5fafb; border-radius:14px;
            box-shadow:0 2px 14px rgba(74,171,196,.13);
        }
        #hint-panel .hint-title {
            color:#4aabc4; font-size:14px; font-weight:bold;
            margin:0 0 7px; white-space:nowrap;
        }
        #hint-panel .hint-row {
            display:flex; align-items:flex-start; gap:6px;
            color:#4b5563; font-size:14px; line-height:1.5;
            margin-bottom:5px; white-space:normal;
        }
        #hint-panel .hint-dot {
            flex-shrink:0; width:6px; height:6px;
            border-radius:50%; background:#4aabc4;
            margin-top:6px;
        }
    </style>
</head>
<body class="h-screen flex flex-col items-center justify-center">

<div id="app" class="w-full max-w-6xl px-3 md:px-5 flex flex-col items-center h-full"
     style="max-height:100dvh; padding-top:clamp(6px,1.2vh,12px); padding-bottom:clamp(6px,1.2vh,12px); gap:clamp(4px,0.8vh,8px);">

    <!-- ① 標題 + 進度 -->
    <div class="w-full flex-shrink-0">
        <h1 class="font-bold text-center mb-2"
            style="font-size:clamp(20px,2.5vw,30px); text-shadow:1px 1px 2px rgba(0,0,0,.05);">
            從操作到推理：發現三角形的面積公式
        </h1>

        <div class="flex justify-center">
          <div id="progress-row" style="
            display:grid;
            grid-template-columns:auto 40px auto 40px auto;
            grid-template-rows:auto auto;
            align-items:center;
            row-gap:5px; column-gap:0;">

                <span class="ss-lbl" id="ss1c">關係的名字</span>
            </div>
            <div style="grid-column:2;grid-row:2;"></div>
            <div id="ss-group-2" class="ss-group ss-hidden" style="grid-column:3;grid-row:2;display:flex;align-items:center;justify-content:center;gap:3px;">
                <span class="ss-lbl" id="ss2a">等值的原因</span>
                <span class="ss-sep">·</span>
                <span class="ss-lbl" id="ss2b">底和高的比較</span>

            </div>

                <span class="ss-sep">·</span>
                <span class="ss-lbl" id="ss3c">面積公式誕生</span>
            </div>

            <div style="display:none">
                <span id="psd1"></span><span id="psd2"></span><span id="psd3"></span><span id="psd-lbl"></span>
                <span id="p2sd1"></span><span id="p2sd2"></span><span id="p2sd-lbl"></span>
                <span id="p3sd1"></span><span id="p3sd2"></span><span id="p3sd3"></span><span id="p3sd-lbl"></span>
            </div>
          </div>
        </div>
    </div>

    <!-- ② 畫布 + ③ 引導面板：包在共同容器內，完成畫面可同時覆蓋兩者 -->
    <div id="canvas-and-guidance-wrap" class="w-full flex-grow flex flex-col" style="min-height:0; position:relative; gap:clamp(4px,0.8vh,8px);">

         style="min-height:0;">

<script>
document.addEventListener('contextmenu', e => e.preventDefault());

let phase=1, p1sub=0, p1triId=false, p1rectId=false, p1done=false;
let p2namedBase=false, p2namedHeight=false, p2base=false, p2height=false, p2moveStep=0, p2started=false, p2confirmed=false, p2baseShown=false, p2heightConfirmed=false, p3phase=1, p3step=0, p3introDone=false, nextFn=null;

function updateProgress() {
    [1,2,3].forEach(i=>{
        const p=document.getElementById(`pill-${i}`);
        p.className='phase-pill';
        if(i<phase) p.classList.add('done');
        else if(i===phase) p.classList.add('active');
    });
    document.getElementById('conn-1').className='phase-conn'+(phase>=2?' done':'');
    document.getElementById('conn-2').className='phase-conn'+(phase>=3?' done':'');
    const sc=(done,cur)=>done?'ss-lbl done':cur?'ss-lbl current':'ss-lbl';
    document.getElementById('ss1a').className=sc(phase>1||p1sub>0, phase===1&&p1sub===0);
    document.getElementById('ss1b').className=sc(phase>1||p1sub>1, phase===1&&p1sub===1);
    document.getElementById('ss1c').className=sc(phase>1||p1sub>2, phase===1&&p1sub===2);
    const p2obs = phase===2&&p2confirmed&&!p2heightConfirmed;
    const p2con = phase===2&&p2heightConfirmed&&!p2base;
    document.getElementById('ss2a').className=sc(phase>2||(phase===2&&p2confirmed), phase===2&&!p2confirmed);
    document.getElementById('ss2b').className=sc(phase>2||(phase===2&&p2heightConfirmed), p2obs);
    document.getElementById('ss2c').className=sc(phase>2||(phase===2&&p2base), p2con);

    // ▲ 只顯示當前大步的小步關鍵字
    [1,2,3].forEach(i=>{
        const g=document.getElementById(`ss-group-${i}`);
        if(g){ g.classList.toggle('ss-hidden', i!==phase); }
    });
    document.getElementById('ss3a').className=sc(phase===3&&p3phase>1||phase>3, phase===3&&p3phase===1);
    document.getElementById('ss3b').className=sc(phase===3&&p3phase>2||phase>3, phase===3&&p3phase===2);
    document.getElementById('ss3c').className=sc(phase>3, phase===3&&p3phase===3);

    // ▲ 統一保險：「底」標籤只在②「指認底」過渡畫面顯示，其餘畫面一律隱藏
    const inBaseIntro = (phase===2 && p2confirmed && p2started && !p2baseShown && p2moveStep===0);
    const _nb = document.getElementById('sv-name-base');
    if(_nb && !inBaseIntro){ _nb.style.display='none'; }
}

function showNext(l,fn){const b=document.getElementById('btn-next');b.innerHTML=l;b.style.display='';nextFn=fn;}
function hideNext(){document.getElementById('btn-next').style.display='none';nextFn=null;}
function doNext(){if(nextFn)nextFn();}
function showHint(on){document.getElementById('hint-panel').style.display=on?'flex':'none';}
function refreshBackBtn(){document.getElementById('btn-back').style.display=(phase===1&&p1sub===0)?'none':'';}

function byId(id){return document.getElementById(id);}
function setShown(id,on){const el=byId(id); if(el) el.style.display=on?'':'none';}
function clearVisualState(){
    [
        'sv-measure','sv-base-hl','sv-height-hl','sv-check','sv-identify','sv-equiv',
        'sv-name-base','sv-name-height','sv-p2-height','sv-p2-hcompare',
        'sv-tri-labels','sv-rect-labels','sv-formula-table',
        'sv-p3-base','sv-p3-width','sv-p3-width-frac'
    ].forEach(id=>setShown(id,false));
    ['sv-label-b-line','sv-label-h-line','sv-p3-base-line1','sv-p3-base-line2','sv-p3-width-line'].forEach(id=>{
        const el=byId(id);
        if(!el) return;
        el.classList.remove('glow-blink');
        el.style.opacity='';
        el.style.transition='';
        if(id==='sv-label-b-line'||id==='sv-label-h-line') {
            el.style.display='none';
            el.style.opacity='0';
        }
    });
    ['sv-tri-b-label','sv-tri-h-label'].forEach(id=>{
        const el=byId(id);
        if(!el) return;
        el.classList.remove('label-glow');
        el.style.opacity='0';
        el.style.transform='translate(0,0) scale(1)';
    });
    ['sv-equiv-arc','sv-equiv-label'].forEach(id=>{
        const el=byId(id);
        if(el) el.style.opacity='0';
    });
    ['sv-f0','sv-f1','sv-f2','sv-f3'].forEach(id=>{
        const el=byId(id);
        if(el){ el.classList.remove('visible'); el.style.display='none'; }
    });
}
function showTriLabelState(){
    setShown('sv-tri-labels',true);
    ['sv-label-b-line','sv-label-h-line'].forEach(id=>{
        const el=byId(id);
        if(el){ el.classList.remove('glow-blink'); el.style.display='none'; el.style.opacity='0'; }
    });
    const h=byId('sv-tri-h-label'); if(h){ h.classList.remove('label-glow'); h.style.opacity='1'; h.style.transform='translate(0,0) scale(1)'; }
    const b=byId('sv-tri-b-label'); if(b){ b.classList.remove('label-glow'); b.style.opacity='1'; b.style.transform='translate(0,0) scale(1)'; }
}
function setP3MeasureState({base=false,width=false,widthFrac=false,baseLine=null,widthLine=null,baseGlow=false,widthGlow=false}={}){
    const showBaseLine=baseLine===null ? base : baseLine;
    const showWidthLine=widthLine===null ? width : widthLine;
    setShown('sv-p3-base',base);
    setShown('sv-p3-width',width);
    setShown('sv-p3-width-frac',widthFrac);
    ['sv-p3-base-line1','sv-p3-base-line2'].forEach(id=>{
        const el=byId(id);
        if(!el) return;
        el.classList.remove('glow-blink');
        el.style.opacity=showBaseLine ? '1' : '0';
        if(baseGlow) el.classList.add('glow-blink');
    });
    const wl=byId('sv-p3-width-line');
    if(wl){
        wl.classList.remove('glow-blink');
        wl.style.opacity=showWidthLine ? '1' : '0';
        if(widthGlow) wl.classList.add('glow-blink');
    }
}

function setPhase(n){
    phase=n; p1sub=0; p1triId=false; p1rectId=false; p1done=false;
    hideNext(); refreshBackBtn();
    clearVisualState();

    ['sv-measure','sv-base-hl','sv-height-hl','sv-check','sv-identify','sv-equiv','sv-name-base','sv-name-height','sv-p2-height','sv-p2-hcompare','sv-tri-labels','sv-rect-labels','sv-formula-table','sv-p3-base','sv-p3-width','sv-p3-width-frac'].forEach(id=>{
        document.getElementById(id).style.display='none';
    });
    ['sv-f0','sv-f1','sv-f2','sv-f3'].forEach(id=>{
        const _el=document.getElementById(id); if(_el){_el.classList.remove('visible');_el.style.display='none';}
    });
    document.getElementById('sv-tri-name').style.display='none';
    document.getElementById('sv-rect-name').style.display='none';
    document.getElementById('sv-tri-glow').classList.remove('id-dim');
    document.getElementById('sv-rect-glow').classList.remove('id-dim');
    updateProgress();
    if(n===1){ showHint(false); initGame(); setDrag(false); document.getElementById('sv-identify').style.display=''; renderIdentifyQuestion(); }
    if(n===2){ p2namedBase=false; p2namedHeight=false; p2base=false; p2height=false; p2moveStep=0; p2started=false; p2confirmed=false; p2baseShown=false; p2heightConfirmed=false; showHint(false); initGame(); renderGuide2Confirm(); }
    if(n===3){ p3phase=1; p3step=0; p3introDone=false; showHint(false); initGame(); renderGuide3(); }
}

function goToP1Sub(n){
    p1sub=n;
    clearVisualState();
    document.getElementById('sv-check').style.display='none';
    document.getElementById('sv-equiv').style.display='none';
    if(n===0){
        p1triId=false; p1rectId=false; p1done=false;
        document.getElementById('sv-tri-name').style.display='none';
        document.getElementById('sv-rect-name').style.display='none';
        document.getElementById('sv-tri-glow').classList.remove('id-dim');
        document.getElementById('sv-rect-glow').classList.remove('id-dim');
        document.getElementById('sv-identify').style.display='';
        showHint(false); setDrag(false); initGame(); hideNext();
    } else if(n===1){
        p1done=false;
        document.getElementById('sv-identify').style.display='none';
        showHint(true); setDrag(true); initGame(); hideNext();
    }
    updateProgress(); refreshBackBtn();
    if(n===0) renderIdentifyQuestion();
    else if(n===1) renderGuide1drag();
}

function goBack(){
    if(phase===1){if(p1sub===1){goToP1Sub(0);return;}if(p1sub===2){goToP1Sub(1);return;}return;}
    if(phase===2){
        if(!p2confirmed){goBackToPhase1Done();return;}
        if(!p2started){p2confirmed=false;renderGuide2Confirm();return;}
        if(p2started&&!p2baseShown&&p2moveStep===0){p2started=false;renderGuide2();return;}
        if(p2baseShown&&p2moveStep===0){p2baseShown=false;startPhase2Observe();return;}
        if(p2moveStep===1){restoreP2Step0();return;}
        if(p2moveStep===2){restoreP2Step1Done();return;}
        if(p2moveStep===3&&p2base){restoreHeightConfirmed();return;}
        if(p2moveStep===3&&!p2base){restoreP2Step2Done();return;}
        return;
    }
    if(phase===3){
        if(p3phase===1){goBackToPhase2Done();return;}
        if(p3phase===2){restoreP3Phase1();return;}
        if(p3phase===3&&!p3introDone){
            if(p3introStep>1){renderDerivationStep(p3introStep-1);return;}
            restoreP3Phase2();return;
        }
        if(p3phase===3&&p3introDone){restoreDerivationIntro();return;}
    }
}

function restoreP2Step0(){
    p2started=true; p2baseShown=true; p2moveStep=0; p2base=false; p2height=false; p2heightConfirmed=false;
    hideNext();
    clearVisualState();
    document.getElementById('sv-name-base').style.display='none';
    movePieceTo('Tri_Left',350,300,0,0); movePieceTo('Tri_Right',450,300,0,0); movePieceTo('Trapezoid',400,500,0,100);
    updateProgress(); refreshBackBtn();
    setTimeout(()=>{
        document.getElementById('guidance-panel').innerHTML=`<div class="fade-up"><p class="q-gray">共三個步驟，每次點按鈕，嵌板會自動移動。</p><button class="disc-btn" id="btn-mv1" style="margin-top:8px;width:100%;text-align:left;" onclick="doMoveStep1()">① 把底部嵌板移到長方形，看底邊 →</button></div>`;
    },500);
}

function restoreP2Step1Done(){
    p2moveStep=1; p2base=false; p2height=false; p2baseShown=true; p2heightConfirmed=false;
    hideNext();
    clearVisualState();
    document.getElementById('sv-name-base').style.display='none';
    document.getElementById('sv-base-hl').style.display='';
    movePieceTo('Tri_Left',350,300,0,0); movePieceTo('Tri_Right',450,300,0,0); movePieceTo('Trapezoid',1000,500,0,0);
    updateProgress(); refreshBackBtn();
    setTimeout(()=>renderP2Step1Panel(),400);

/* 使用者每按一次「繼續」，推進一個節奏。p3introStep 從1開始，對應節奏2~6 */
function nextDerivationStep(){
    p3introStep++;
    const r=document.getElementById('deriv-right');
    const btn=document.getElementById('deriv-next-btn');
    const subRow=document.getElementById('deriv-sub-row');
    const sub=document.getElementById('deriv-sub');

    // 通用：deriv-right 漸出→換內容→漸入
    function fadeSwap(el, newContent){
        if(!el) return;
        el.style.opacity='0';
        setTimeout(()=>{ el.innerHTML=newContent; el.style.opacity='1'; },300);
    }
    // 補充說明換內容（帶漸出漸入）
    function fadeSubSwap(newContent, delay=400){
        if(subRow) subRow.style.opacity='0';
        setTimeout(()=>{
            if(sub) sub.innerHTML=newContent;
            if(subRow) subRow.style.opacity='1';
        }, delay);
    }

    // 輔助：讓線條亮起閃爍
    function glow(id){ const e=document.getElementById(id); if(e){ e.style.opacity='1'; e.classList.remove('glow-blink'); void e.offsetWidth; e.classList.add('glow-blink'); } }
    // 輔助：線條靜態可見
    function show(id){ const e=document.getElementById(id); if(e){ e.classList.remove('glow-blink'); e.style.opacity='1'; } }
    // 輔助：線條透明（文字符號仍然顯示）
    function hide(id){ const e=document.getElementById(id); if(e){ e.classList.remove('glow-blink'); e.style.opacity='0'; } }

    if(p3introStep===2){
        // 節奏2：長 × 寬，所有線條維持透明，補充「長方形的面積」
        fadeSwap(r,'長 × 寬');
        fadeSubSwap('長方形的面積');
    }
    else if(p3introStep===3){
        // 節奏3：b × 寬，底線閃爍，寬線透明，b標籤閃爍呼應
        glow('sv-p3-base-line1'); glow('sv-p3-base-line2');
        hide('sv-p3-width-line');
        const svB=document.getElementById('sv-tri-b-label');
        if(svB){ svB.classList.remove('label-glow'); void svB.offsetWidth; svB.classList.add('label-glow'); }
        fadeSwap(r,'<span style="color:#fe8081;font-family:Georgia,serif;font-style:italic;">b</span> × 寬');
        fadeSubSwap('長，就是 <span style="color:#fe8081;font-family:Georgia,serif;font-style:italic;font-weight:bold;">b</span>（亮起的黃線）');
    }
    else if(p3introStep===4){
        // 節奏4：b × h的一半，底線透明，寬線閃爍
        hide('sv-p3-base-line1'); hide('sv-p3-base-line2');
        glow('sv-p3-width-line');
        fadeSwap(r,'<span style="color:#fe8081;font-family:Georgia,serif;font-style:italic;">b</span> × <span style="color:#fe8081;font-family:jf-openhuninn,Huninn,sans-serif;font-style:normal;"><span style="font-family:Georgia,serif;font-style:italic;">h</span>的一半</span>');
        fadeSubSwap('寬，是「<span style="font-family:jf-openhuninn,Huninn,sans-serif;"><span style="font-family:Georgia,serif;font-style:italic;color:#4aabc4;">h</span><span style="color:#4aabc4;">的一半</span></span>」（亮起的黃線）');
    }
    else if(p3introStep===5){
        // 節奏5：b × h/2（分數），底線透明，寬線閃爍，不顯示三角形高線
        // 顯示 h/2 分數標籤
        hide('sv-p3-base-line1'); hide('sv-p3-base-line2');
        glow('sv-p3-width-line');
        document.getElementById('sv-p2-height').style.display='none';
        document.getElementById('sv-p3-width-frac').style.display='';
        fadeSwap(r,`<span style="color:#fe8081;font-family:Georgia,serif;font-style:italic;">b</span><span style="color:#fe8081;"> × </span><span style="display:inline-flex;flex-direction:column;align-items:center;vertical-align:middle;color:#fe8081;font-family:Georgia,serif;font-style:italic;line-height:1.1;font-size:0.9em;"><span style="border-bottom:2px solid #fe8081;padding:0 2px;"><span style="font-size:1.1em;">h</span></span><span>2</span></span>`);
        fadeSubSwap('<span style="display:inline-flex;align-items:baseline;padding-left:3.5em;font-family:jf-openhuninn,Huninn,sans-serif;color:#9ca3af;"><span style="font-family:Georgia,serif;font-style:italic;">h</span>的一半</span>');
        if(btn) btn.textContent='來看看完整的公式 →';
    }
    else if(p3introStep>=6){
        goToP3Phase3();
    }
}

function getSnapDist(p){
    if(!p||!SNAPS[p.type]) return Infinity;
    let m=Infinity;
    for(const s of SNAPS[p.type]){ const d=Math.sqrt((p.x-s.x)**2+(p.y-s.y)**2); if(d<m) m=d; }
    return m;
}

const HDL={triL:{x:15,y:30},triR:{x:-15,y:30},trap:{x:0,y:20}};
const SNAPS={triL:[{x:350,y:300,r:0},{x:850,y:500,r:180},{x:1150,y:500,r:0}],triR:[{x:450,y:300,r:0},{x:1150,y:500,r:180},{x:850,y:500,r:0}],trap:[{x:400,y:500,r:0},{x:1000,y:500,r:0},{x:1000,y:500,r:180}]};

function assembleRect(){pieces=INIT.map(p=>({...p,x:p.sx,y:p.sy,rot:p.sr}));const pos={Tri_Left:{x:850,y:500,rot:180},Tri_Right:{x:1150,y:500,rot:180},Trapezoid:{x:1000,y:500,rot:0}};pieces.forEach(p=>{if(pos[p.id])Object.assign(p,pos[p.id]);});hideRotUI();renderPieces();}
function renderPieces(){pLayer.innerHTML='';pieces.forEach(p=>{const g=document.createElementNS('http://www.w3.org/2000/svg','g');g.setAttribute('id',p.id);g.setAttribute('class','draggable animating');g.setAttribute('data-id',p.id);const dot='#991b1b';if(p.type==='triL')g.innerHTML=`<polygon points="50,-100 -50,100 50,100" fill="${p.color}" filter="url(#plate-3d)"/><circle cx="${HDL.triL.x}" cy="${HDL.triL.y}" r="4" fill="${dot}"/>`;if(p.type==='triR')g.innerHTML=`<polygon points="-50,-100 -50,100 50,100" fill="${p.color}" filter="url(#plate-3d)"/><circle cx="${HDL.triR.x}" cy="${HDL.triR.y}" r="4" fill="${dot}"/>`;if(p.type==='trap')g.innerHTML=`<polygon points="-100,-100 100,-100 200,100 -200,100" fill="${p.color}" filter="url(#plate-3d)"/><circle cx="${HDL.trap.x}" cy="${HDL.trap.y}" r="4" fill="${dot}"/>`;pLayer.appendChild(g);applyTransform(p,false);});}
function applyTransform(p,a){const el=document.getElementById(p.id);if(!el)return;a?el.classList.add('animating'):el.classList.remove('animating');el.setAttribute('transform',`translate(${p.x},${p.y}) rotate(${p.rot})`);}
function showRotUI(p){rotOffset.setAttribute('transform',`translate(${HDL[p.type].x},${HDL[p.type].y})`);rotUI.style.display='';rotAnim.classList.remove('pop-in');void rotAnim.offsetWidth;rotAnim.classList.add('pop-in');moveRotUI(p);}
function hideRotUI(){rotUI.style.display='none';rotHP=null;}
function moveRotUI(p){rotUI.setAttribute('transform',`translate(${p.x},${p.y}) rotate(${p.rot})`);}

let actP=null,startPtr={x:0,y:0},startCli={x:0,y:0},startPos={x:0,y:0},moved=false,lpTimer=null,lpTriggered=false,rotating=false,rotHP=null,prevAngle=0,rotated=false;
function svgXY(cx,cy){const r=canvas.getBoundingClientRect();return{x:(cx-r.left)*1450/r.width,y:(cy-r.top)*800/r.height};}
function cli(e){if(e.touches?.length)return{x:e.touches[0].clientX,y:e.touches[0].clientY};if(e.changedTouches?.length)return{x:e.changedTouches[0].clientX,y:e.changedTouches[0].clientY};return{x:e.clientX,y:e.clientY};}
canvas.addEventListener('pointerdown',e=>{if(e.target.closest('#rotate-ui-container')){e.preventDefault();canvas.setPointerCapture(e.pointerId);rotating=true;rotated=false;actP=rotHP;const c=cli(e);startCli={...c};const sv=svgXY(c.x,c.y);prevAngle=Math.atan2(sv.y-actP.y,sv.x-actP.x)*180/Math.PI;return;}const el=e.target.closest('.draggable');if(!el){hideRotUI();return;}e.preventDefault();canvas.setPointerCapture(e.pointerId);actP=pieces.find(p=>p.id===el.getAttribute('data-id'));if(!actP)return;if(rotHP!==actP)hideRotUI();el.classList.remove('animating');el.classList.add('dragging');pLayer.appendChild(el);const c=cli(e);startCli={...c};startPtr=svgXY(c.x,c.y);startPos={x:actP.x,y:actP.y};moved=false;lpTriggered=false;lpTimer=setTimeout(()=>{if(moved)return;lpTriggered=true;rotating=true;rotHP=actP;prevAngle=Math.atan2(svgXY(startCli.x,startCli.y).y-actP.y,svgXY(startCli.x,startCli.y).x-actP.x)*180/Math.PI;showRotUI(actP);if(navigator.vibrate)navigator.vibrate(50);},500);});
canvas.addEventListener('pointermove',e=>{const c=cli(e);const dx=c.x-startCli.x,dy=c.y-startCli.y;if(rotating&&actP){e.preventDefault();if(Math.abs(dx)>5||Math.abs(dy)>5)rotated=true;const sv=svgXY(c.x,c.y);const d2=Math.sqrt((sv.x-actP.x)**2+(sv.y-actP.y)**2);if(d2>5){const ca=Math.atan2(sv.y-actP.y,sv.x-actP.x)*180/Math.PI;let diff=ca-prevAngle;if(diff>180)diff-=360;else if(diff<-180)diff+=360;actP.rot+=diff;prevAngle=ca;applyTransform(actP,false);moveRotUI(actP);}return;}if(!actP)return;e.preventDefault();if(!moved&&(Math.abs(dx)>10||Math.abs(dy)>10)){moved=true;if(lpTimer){clearTimeout(lpTimer);lpTimer=null;}hideRotUI();}if(moved&&!lpTriggered){const sv=svgXY(c.x,c.y);actP.x=startPos.x+(sv.x-startPtr.x);actP.y=startPos.y+(sv.y-startPtr.y);applyTransform(actP,false);const _sg=document.getElementById('sv-snap-glow');if(_sg){const _d=getSnapDist(actP);if(_d<25){_sg.style.opacity='1';_sg.setAttribute('stroke-width','10');}else if(_d<40){_sg.style.opacity='0.6';_sg.setAttribute('stroke-width','7');}else{_sg.style.opacity='0';_sg.setAttribute('stroke-width','7');}}}});
canvas.addEventListener('pointerup',e=>{if(lpTimer){clearTimeout(lpTimer);lpTimer=null;}if(rotating){rotating=false;canvas.releasePointerCapture(e.pointerId);if(!rotated&&!lpTriggered)hideRotUI();else{snap(actP);applyTransform(actP,true);moveRotUI(actP);}actP=null;return;}if(!actP)return;canvas.releasePointerCapture(e.pointerId);const el=document.getElementById(actP.id);if(el)el.classList.remove('dragging');if(!moved&&!lpTriggered){if(rotHP===actP)hideRotUI();else{actP.rot+=90;snap(actP);applyTransform(actP,true);}}else if(moved){snap(actP);applyTransform(actP,true);}const _sg2=document.getElementById('sv-snap-glow');if(_sg2){_sg2.style.opacity='0';_sg2.setAttribute('stroke-width','7');}actP=null;});
function snap(p){for(const pt of(SNAPS[p.type]||[])){const dist=Math.sqrt((p.x-pt.x)**2+(p.y-pt.y)**2);if(dist<60){const nr=((p.rot%360)+360)%360;let ad=Math.abs(nr-pt.r);if(ad>180)ad=360-ad;if(ad<30){const occ=pieces.some(q=>q.id!==p.id&&Math.abs(q.x-pt.x)<5&&Math.abs(q.y-pt.y)<5&&((q.rot%360)+360)%360===pt.r);let conflict=false;if(pt.x>=800&&pt.x<=1200&&pt.y>=400&&pt.y<=600){const isA=(p.type==='trap'&&pt.r===0)||(p.type==='triL'&&pt.x===850&&pt.r===180)||(p.type==='triR'&&pt.x===1150&&pt.r===180);const isB=(p.type==='trap'&&pt.r===180)||(p.type==='triR'&&pt.x===850&&pt.r===0)||(p.type==='triL'&&pt.x===1150&&pt.r===0);const hasA=pieces.some(q=>q.id!==p.id&&q.x>=800&&q.x<=1200&&q.y>=400&&q.y<=600&&((q.type==='trap'&&((q.rot%360)+360)%360===0)||(q.type==='triL'&&q.x===850&&((q.rot%360)+360)%360===180)||(q.type==='triR'&&q.x===1150&&((q.rot%360)+360)%360===180)));const hasB=pieces.some(q=>q.id!==p.id&&q.x>=800&&q.x<=1200&&q.y>=400&&q.y<=600&&((q.type==='trap'&&((q.rot%360)+360)%360===180)||(q.type==='triR'&&q.x===850&&((q.rot%360)+360)%360===0)||(q.type==='triL'&&q.x===1150&&((q.rot%360)+360)%360===0)));if((isA&&hasB)||(isB&&hasA))conflict=true;}if(!occ&&!conflict){p.x=pt.x;p.y=pt.y;let tr=pt.r;while(tr-p.rot>180)tr-=360;while(p.rot-tr>180)tr+=360;p.rot=tr;break;}}}}checkDone();}
function checkDone(){if(phase!==1||p1sub!==1)return;if(pieces.every(p=>p.x>=800&&p.x<=1200&&p.y===500))onAssembled();}

setPhase(1);
</script>
